# Memabra Configuration

# Intuition Network
intuition:
  type: "simple"  # or "neural" in Phase 2
  embedding_dim: 384
  confidence_threshold: 0.7
  learning_rate: 0.01
  
  strategies:
    - direct_answer
    - search_required
    - tool_use
    - clarification

# Memory System
memory:
  # Episodic memory settings
  episodic:
    max_entries: 10000
    retention_days: 30
    
  # Semantic memory settings
  semantic:
    similarity_threshold: 0.75
    
  # Procedural memory settings
  procedural:
    pattern_match_threshold: 0.8
  
  # Storage backend
  storage:
    type: "local"  # or "chroma"
    path: "./data/memories"

# Feedback System
feedback:
  implicit:
    enabled: true
    
    # Keyword detection
    positive_keywords:
      - "谢谢"
      - "可以"
      - "ok"
      - "好的"
      - "搞定了"
      
    negative_keywords:
      - "不对"
      - "错了"
      - "不是"
      - "不行"
      - "算了"
      
    clarification_patterns:
      - "为什么"
      - "怎么"
      - "那"
      - "还有"
    
    # Similarity thresholds
    similarity_threshold: 0.75
    repeat_threshold: 0.7
    
    # Reward weights
    weights:
      explicit: 1.0
      implicit: 0.7
      delayed: 0.5
  
  delayed_assignment:
    enabled: true
    gamma: 0.9  # Discount factor
    min_turns: 3

# Learning
learning:
  # Online learning settings
  online:
    enabled: true
    batch_size: 1
    update_frequency: "immediate"
  
  # Forgetting curve
  forgetting:
    enabled: true
    base_half_life: 432000  # 5 days in seconds
    access_boost: 0.1

# Logging
logging:
  level: "INFO"
  log_dir: "./logs"
  log_conversations: true
  log_decisions: true
